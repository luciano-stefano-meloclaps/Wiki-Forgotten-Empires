services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - Notion__Secret=${NOTION_SECRET}
      - Notion__DatabaseId=${NOTION_DATABASE_ID}
      - Notion__CharactersDatabaseId=${NOTION_CHARACTERS_DATABASE_ID}
      - Notion__CivilizationsDatabaseId=${NOTION_CIVILIZATIONS_DATABASE_ID}
      - Notion__BattlesDatabaseId=${NOTION_BATTLES_DATABASE_ID}
      - Notion__AgesDatabaseId=${NOTION_AGES_DATABASE_ID}
    volumes:
      - ./database:/app/database
    networks:
      - for-empires-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - INTERNAL_API_URL=http://api:8080/api
      - NODE_ENV=production
    networks:
      - for-empires-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  for-empires-net:
    driver: bridge
