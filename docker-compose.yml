services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/database/wiki-forgotten-empires.db
    volumes:
      - ./database:/app/database
    networks:
      - for-empires-net
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - INTERNAL_API_URL=http://api:8080/api
      - NODE_ENV=production
    networks:
      - for-empires-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  for-empires-net:
    driver: bridge

volumes:
  db_data:
